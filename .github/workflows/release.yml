name: Build & Release

on:
  push:
    branches: [main, master]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: RobloxOptimizer

jobs:
  # ── Build & Test ────────────────────────────────────────────────────────────
  build:
    name: Build (Windows x64)
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust stable (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build (debug — for PR checks)
        if: github.event_name == 'pull_request'
        run: cargo build --target x86_64-pc-windows-msvc

      - name: Build (release)
        if: github.event_name != 'pull_request'
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Upload release artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-windows-x64
          path: target/x86_64-pc-windows-msvc/release/${{ env.BINARY_NAME }}.exe
          if-no-files-found: error

  # ── Clippy + fmt ─────────────────────────────────────────────────────────────
  lint:
    name: Lint (clippy + rustfmt)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc
          components: clippy, rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --target x86_64-pc-windows-msvc -- -D warnings

  # ── GitHub Release (only on version tags) ───────────────────────────────────
  release:
    name: Publish GitHub Release
    runs-on: windows-latest
    needs: [build, lint]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust stable (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Rename binary with version tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Copy-Item `
            "target/x86_64-pc-windows-msvc/release/${{ env.BINARY_NAME }}.exe" `
            "${{ env.BINARY_NAME }}-$tag-windows-x64.exe"

      - name: Create GitHub Release & upload .exe
        uses: softprops/action-gh-release@v2
        with:
          name: "RobloxOptimizer ${{ github.ref_name }}"
          body_path: .github/RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          files: |
            ${{ env.BINARY_NAME }}-${{ github.ref_name }}-windows-x64.exe
