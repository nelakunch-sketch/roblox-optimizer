name: "✨ Feature Request"
description: Suggest a new optimization or improvement
title: "[Feature]: "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make RobloxOptimizer better?
        Please make sure it follows our rule: **no injection, no memory access**.

  - type: checkboxes
    id: safe
    attributes:
      label: Safety check
      options:
        - label: This feature does NOT involve DLL injection, memory read/write, or anti-cheat bypass
          required: true
        - label: I searched existing issues and this is not a duplicate
          required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: "e.g. GPU scheduling priority isn't being set..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the feature
      placeholder: "e.g. Use SetGpuPriorityClass / D3DKMTSetProcessSchedulingPriorityClass..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered

  - type: dropdown
    id: contribution
    attributes:
      label: Are you willing to implement this?
      options:
        - "Yes — I'll open a PR"
        - "Maybe — I can help with testing"
        - "No — just a suggestion"
