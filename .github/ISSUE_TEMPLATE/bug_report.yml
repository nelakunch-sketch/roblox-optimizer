name: "🐛 Bug Report"
description: Something isn't working as expected
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        Please be as detailed as possible.

  - type: checkboxes
    id: existing
    attributes:
      label: Pre-flight checklist
      options:
        - label: I ran the program as **Administrator**
          required: true
        - label: I searched existing issues and this is not a duplicate
          required: true

  - type: dropdown
    id: windows
    attributes:
      label: Windows version
      options:
        - Windows 11 (23H2 or newer)
        - Windows 11 (22H2)
        - Windows 10 (22H2)
        - Windows 10 (21H2)
        - Other (specify in description)
    validations:
      required: true

  - type: dropdown
    id: feature
    attributes:
      label: Which optimization failed?
      multiple: true
      options:
        - Timer Resolution
        - Process Priority
        - RAM Standby Purge
        - Network Registry
        - Full Optimization
        - Other / Startup crash
    validations:
      required: true

  - type: textarea
    id: what
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error message / console output
      description: Paste the exact error text from the console window.
      render: text

  - type: input
    id: version
    attributes:
      label: RobloxOptimizer version
      placeholder: "e.g. v1.0.0"
    validations:
      required: true
